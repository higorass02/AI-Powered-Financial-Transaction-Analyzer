version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: financial_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
      - backend_storage:/var/www/backend/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - financial_network
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: financial_queue
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
      - backend_storage:/var/www/backend/storage
    env_file:
      - ./backend/.env
    depends_on:
      - app
      - redis
    networks:
      - financial_network
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90

  frontend:
    image: node:20-alpine
    container_name: financial_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - financial_network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  postgres:
    image: postgres:15-alpine
    container_name: financial_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financial_analyzer
      POSTGRES_USER: financial_user
      POSTGRES_PASSWORD: financial_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - financial_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial_user -d financial_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financial_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - financial_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
  backend_vendor:
  backend_storage:
  frontend_modules:

networks:
  financial_network:
    driver: bridge
